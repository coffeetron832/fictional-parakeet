<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FISHEANS - Tienda Oficial</title>

  <!-- FAVICONS -->
  
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
  <meta name="theme-color" content="#000000">

  <!-- FUENTES -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;600;700;800&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Open Sans', sans-serif;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 80px 20px 60px;
    }

    .logo-container {
      position: relative;
      display: inline-block;
    }

   .water-title {
  position: relative;
  font-family: 'Archivo', sans-serif;
  font-weight: 800;
  font-size: 4rem;
  letter-spacing: 1px;
  color: #fff;
  line-height: 1;
}

/* Agua solo en la parte inferior */
.water-title::after {
  content: "FISHEANS";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;

  background: linear-gradient(
    120deg,
    #0a3cff,
    #1ec9ff,
    #0a3cff
  );
  background-size: 200% 200%;
  animation: waveMove 6s ease-in-out infinite;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  color: transparent;

  /* 🔥 AQUÍ ESTÁ LA MAGIA */
  clip-path: polygon(
    0% 65%,
    10% 62%,
    20% 66%,
    30% 63%,
    40% 67%,
    50% 64%,
    60% 68%,
    70% 65%,
    80% 69%,
    90% 66%,
    100% 70%,
    100% 100%,
    0% 100%
  );
}


    .pose {
      position: absolute;
      bottom: -2px;
      right: -48px;
      width: 90px;
      transform: rotate(-6deg);
      z-index: 2;
    }

    .intro {
      max-width: 700px;
      margin: 40px auto 0;
      text-align: center;
      font-size: 1rem;
      line-height: 1.6;
      color: #ccc;
      padding: 0 20px;
    }

    /* SECCIÓN SÍMBOLOS / PRODUCTOS */
    .characters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 40px;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .character {
      text-align: center;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease;
      cursor: pointer;
    }

    .character.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .character img {
      width: 200px;
      height: auto;
      margin-bottom: -5px;
    }

    .character h2 {
      font-family: 'Archivo', sans-serif;
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    .character p {
      font-size: 0.95rem;
      max-width: 260px;
      margin: 0 auto;
      line-height: 1.5;
      color: #ccc;
    }

    /* MODAL */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal {
      background: #111;
      border: 1px solid #333;
      width: 90%;
      max-width: 400px;
      padding: 25px;
      border-radius: 10px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal h3 {
      font-family: 'Archivo', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .modal p {
      color: #ccc;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .close-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: none;
      background: #fff;
      color: #000;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .close-btn:hover {
      background: #ddd;
    }

    /* FOOTER */
    footer {
      margin-top: 80px;
      padding: 40px 20px;
      background: #0a0a0a;
      border-top: 1px solid #222;
      text-align: center;
    }

    footer .links {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    footer a {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
    }

    footer a:hover {
      color: #fff;
    }

    footer p {
      color: #666;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo-container">
      <h1 class="water-title">FISHEANS</h1>
      <img src="0988.png" alt="Símbolo pez" class="pose">
    </div>
    <p class="intro">
      Denim funcional. Un símbolo que se mueve distinto.
    </p>
  </header>

  <!-- PRODUCTOS / SÍMBOLOS -->
  <section class="characters">

    <div class="character" id="fish-1">
      <img src="fish1.png" alt="Fish Symbol 1">
      <h2>Modelo 01</h2>
      <p>Denim recto. Resistencia diaria.</p>
    </div>

    <div class="character" id="fish-2">
      <img src="fish2.png" alt="Fish Symbol 2">
      <h2>Modelo 02</h2>
      <p>Corte relajado. Movimiento natural.</p>
    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <div class="links">
      <a href="#">Sobre FISHEANS</a>
      <a href="#">Contacto</a>
      <a href="#">Términos</a>
    </div>
    <p>© 2025 FISHEANS. Todos los derechos reservados.</p>
  </footer>

  <!-- JS -->
  <script>
    const chars = document.querySelectorAll('.character');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.2 });
    chars.forEach(char => observer.observe(char));
  </script>

  <!-- Pixel trail -->
  <script src="pxt.js"></script>

</body>
</html>
