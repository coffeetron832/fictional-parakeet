<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Half True | Urban Wear</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: #0f0f0f;
      color: #f5f5f5;
    }

    header {
      padding: 30px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 3rem;
      letter-spacing: 2px;
    }

    header p {
      color: #aaa;
      margin-top: 10px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 20px;
    }

    nav a {
      color: #f5f5f5;
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    nav a:hover {
      color: #7aff00;
    }

    .hero {
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(180deg, #000, #111);
    }

    .hero h2 {
      font-size: 2.5rem;
      max-width: 600px;
    }

    .products {
      padding: 60px 10%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .product {
      background: #151515;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .product:hover {
      transform: translateY(-5px);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .product h3 {
      margin-bottom: 8px;
    }

    .product span {
      color: #7aff00;
      font-weight: bold;
    }

    footer {
      padding: 40px;
      text-align: center;
      border-top: 1px solid #222;
      color: #777;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>HALF TRUE</h1>
    <p>Urban clothing for real streets</p>
  </header>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Tienda</a>
    <a href="#">Colección</a>
    <a href="#">Contacto</a>
  </nav>

  <section class="hero">
    <h2>No es moda. Es identidad.</h2>
  </section>

  <section class="products">
    <div class="product">
      <img src="https://via.placeholder.com/400x500" alt="Camiseta Half True" />
      <h3>Camiseta Oversize</h3>
      <span>$90.000 COP</span>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/400x500" alt="Hoodie Half True" />
      <h3>Hoodie Street</h3>
      <span>$180.000 COP</span>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/400x500" alt="Gorra Half True" />
      <h3>Gorra Minimal</h3>
      <span>$60.000 COP</span>
    </div>
  </section>

  <footer>
    © 2025 Half True — Diseñado desde la calle.
  </footer>

</body>
</html>
